<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<title>Security Key Verification</title>

</head>

<body>

<header>
  <img src="125.png" class="logo">
  <h3>Secure Investigation Portal</h3>
</header>

<div class="container">

<h2>Security Key Verification</h2>

<input id="key" placeholder="Enter Security Key">

<button onclick="verify()">Verify Key</button>

<div id="loader" class="loader" style="display:none;"></div>

<p id="status"></p>

<button onclick="nextPage()">Next</button>

</div>

<footer>
© 2026 Secure System
</footer>

<!-- ✅ SCRIPT -->
<script>

let verified = false;

function verify(){

  let key = document.getElementById("key").value;
  let status = document.getElementById("status");
  let loader = document.getElementById("loader");

  if(!key){
    status.innerText = "Enter Security Key ❌";
    return;
  }

  loader.style.display = "block";
  status.innerText = "Verifying Security Key...";

  setTimeout(()=>{
    loader.style.display = "none";

    if(key === "876875689008"){
      status.innerText = "Officer Verified ✅\nEric C. Monti | Badge: EMC1978FTC";
      verified = true;
    } else {
      status.innerText = "Invalid Security Key ❌";
      verified = false;
    }

  },1500);
}

function nextPage(){

  let status = document.getElementById("status");

  if(!verified){
    status.innerText = "Please verify key first ❌";
    return;
  }

  status.innerText = "Redirecting...";

  setTimeout(()=>{
    window.location.href = "signup9.html";
  },1000);
}

</script>

</body>
</html>
