<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<title>Create Account</title>

</head>

<body>

<header>
  <img src="125.png" class="logo">
  <h3>Secure Investigation Portal</h3>
</header>

<div class="container">

<h2>Create Username & Password</h2>

<input id="user" placeholder="Username">

<button onclick="suggest()">Suggest Username</button>
<button onclick="check()">Check Availability</button>

<p id="userMsg"></p>

<input id="pass" type="password" placeholder="Create Password">
<input id="confirm" type="password" placeholder="Confirm Password">

<p id="passMsg"></p>

<button onclick="next()">Next</button>

</div>

<footer>
© 2026 Secure System
</footer>

<!-- ✅ SCRIPT -->
<script>

let usernameOK = false;

function suggest(){
  let name = "agent" + Math.floor(Math.random()*9999);
  document.getElementById("user").value = name;
}

function check(){
  let user = document.getElementById("user").value;
  let msg = document.getElementById("userMsg");

  if(!user){
    msg.innerText = "Enter username ❌";
    usernameOK = false;
    return;
  }

  msg.innerText = "Checking...";

  setTimeout(()=>{
    msg.innerText = "Username Available ✅";
    usernameOK = true;
  },1500);
}

function next(){

  let pass = document.getElementById("pass").value;
  let confirm = document.getElementById("confirm").value;
  let passMsg = document.getElementById("passMsg");

  if(!usernameOK){
    document.getElementById("userMsg").innerText = "Check username first ❌";
    return;
  }

  if(!pass || !confirm){
    passMsg.innerText = "Enter password ❌";
    return;
  }

  if(pass !== confirm){
    passMsg.innerText = "Passwords do not match ❌";
    return;
  }

  passMsg.innerText = "Processing...";

  setTimeout(()=>{
    window.location.href = "signup6.html";
  },1000);
}

</script>

</body>
</html>
