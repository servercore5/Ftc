<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<title>Secure Portal</title>

</head>

<body>

<header>
  <img src="125.png" class="logo">
  <h3>Fedral Trade Commission Portal</h3>
</header>

<div class="container">

<h2>Security Clearance</h2>

<input id="code" placeholder="Enter Access Code">

<button onclick="check()">Enter</button>

<p id="msg"></p>

</div>

<footer>
© 2026 FTC Secure System
</footer>

<!-- ✅ IMPORTANT SCRIPT -->
<script>
function check(){
  let input = document.getElementById("code").value;
  let message = document.getElementById("msg");

  if(input === "231897"){
    window.location.href = "auth.html";
  } else {
    message.innerText = "Invalid Code ❌";
  }
}
</script>

</body>
</html>
